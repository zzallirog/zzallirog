<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" role="img" aria-label="wake up, neo... the matrix has you. you can't trust what an agent says it did. watch the wire. network-level attestation for local AI agents.">
  <defs>
    <style>
      .mono { font-family: "DejaVu Sans Mono", "Liberation Mono", Menlo, Consolas, monospace; font-weight: 500; }
      .hook   { fill:#46d160; font-size:17px; }
      .thesis { fill:#86b394; font-size:17px; }
      .wire   { fill:#46d160; }
      .sub    { fill:#2f6b45; font-size:14px; letter-spacing:.5px; }
      /* base = visible -> degrades to plain text if animation is dropped */
      .k   { animation: keyin 0.07s ease both; }
      .cur { fill:#46d160; animation: keyin .1s linear both, blink 1.9s steps(1) 13.06s infinite; }
      .sub { animation: fade 1s ease 13.51s both; }
      @keyframes keyin { from { opacity:0; } to { opacity:1; } }
      @keyframes fade  { from { opacity:0; } to { opacity:1; } }
      @keyframes blink { 50% { opacity:0; } }
    </style>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
